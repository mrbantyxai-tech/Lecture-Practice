<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>Input Types & </title>
		<style>
			table{
				border-collapse: collapse;
			}
		</style>
	</head>
	<body>
		<!-- input Types in HTML (All input Types is display : inline) -->
		<input type="text" name=""> 
		<input type="button"  value="submit" name="">
		<input type="submit" name="">
		<input type="reset" name="">
		<input type="color" name="">
		<input type="date" name="">
		<input type="time" name="">
		<input type="datetime-local" name="">
		<input type="month" name="">
		<input type="week" name="">
		<input type="checkbox" name="">
		<input type="radio" name="gender">
		<input type="radio" name="gender"> 
		<input type="url" name="" hidden>
		<input type="range" name="">
		<input type="hidden" name="">
		<input type="file " name="">
		<input type="email" name="">
		<input type="tel" name="">
		<input type="password" name="">
		<input type="number" name="">
		<input type="search" name="">
		<input type="image" name="">


		<!-- HTML Table Tag -->


		<!-- 1.Basic Table -->

		<table border="2" cellpadding="5" cellspacing="5">
			<thead>
				<tr>
					<th>Name</th>
					<th>Age</th>
					<th>Gender</th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<td>Banty</td>
					<td>19</td>
					<td>Male</td>
				</tr>
				<tr>
					<td>RP</td>
					<td>20</td>
					<td>Female</td>
				</tr>
				<tr>
					<td>Chagan</td>
					<td>40</td>
					<td>Male</td>
				</tr>
			</tbody>
		</table>



		<!-- 2.Merged Table -->

		<table border="2" cellpadding="5" cellspacing="5">
			<thead>
				<tr>
					<th colspan="2">Name & Age</th>
					<th>Gender</th>
					<th>Course</th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<td>Banty</td>
					<td>19</td>
					<td rowspan="3">Male</td>
					<td rowspan="2">CarrerX-Ai</td>
				</tr>
				<tr>
					<td>RP</td>
					<td>20</td>
					<!-- <td>Male</td>-->
					<!-- <td>CarrerX-Ai</td>-->
				</tr>
				<tr>
					<td>Chagan</td>
					<td>40</td>
					<!-- <td>Male</td>-->
					<td>Animation</td>
				</tr>
			</tbody>
		</table> 



		<!-- 3.Table with colgroup -->

		<table border="2" cellpadding="5" cellspacing="5">
			<colgroup>
				<col span="1" bgcolor="orange">
				<col span="2" bgcolor="white">
				<col span="3" bgcolor="green">
			</colgroup>
			<thead>
				<tr>
					<th colspan="2">Name & Age</th>
					<th>Gender</th>
					<th>Course</th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<td>Banty</td>
					<td>19</td>
					<td rowspan="3">Male</td>
					<td rowspan="2">CarrerX-Ai</td>
				</tr>
				<tr>
					<td>RP</td>
					<td>20</td>
					<!-- <td>Male</td>-->
					<!-- <td>CarrerX-Ai</td>-->
				</tr>
				<tr>
					<td>Chagan</td>
					<td>40</td>
					<!-- <td>Male</td>-->
					<td>Animation</td>
				</tr>
			</tbody>
		</table> 


	</body>


</html>
